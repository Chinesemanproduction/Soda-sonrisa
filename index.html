<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soda Sonrisas - Orden en Línea</title>
    <style>
        :root {
            --primary: #ff6b35;
            --primary-dark: #e55a2b;
            --secondary: #27ae60;
            --danger: #e74c3c;
            --bg: #f8f9fc;
            --card: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #eef2f7;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-hover: 0 4px 20px rgba(0,0,0,0.1);
            --radius: 16px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px 16px 140px 16px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding: 12px 0;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .header p {
            color: var(--text-light);
            font-size: 14px;
            font-weight: 500;
        }

        .lang-bar {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 20px;
        }
        .lang-btn {
            background: var(--card);
            border: 1.5px solid #e0e4e8;
            padding: 7px 16px;
            border-radius: 25px;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .lang-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .lang-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(255,107,53,0.3);
        }

        .input-section {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .input-section:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.08);
        }
        .input-label {
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text);
            font-size: 14px;
        }
        .input-field {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #e0e4e8;
            border-radius: 12px;
            font-size: 16px;
            transition: var(--transition);
            background: #fafbfc;
            font-family: inherit;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }
        .input-error {
            color: var(--danger);
            font-size: 12px;
            margin-top: 6px;
            display: none;
            font-weight: 500;
            animation: shake 0.3s ease;
        }
        .input-error.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .search-box {
            margin-bottom: 20px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 14px 18px 14px 44px;
            border: 1.5px solid #e0e4e8;
            border-radius: 30px;
            font-size: 15px;
            background: var(--card);
            transition: var(--transition);
            font-family: inherit;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.08);
        }
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 16px;
        }
        .search-clear {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: #e0e4e8;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text);
        }
        .search-clear.show {
            display: flex;
        }

        .category {
            font-size: 18px;
            font-weight: 800;
            margin: 24px 0 14px 4px;
            padding-left: 14px;
            border-left: 4px solid var(--primary);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .category-count {
            font-size: 13px;
            color: var(--text-light);
            font-weight: 600;
            background: var(--bg);
            padding: 2px 10px;
            border-radius: 20px;
        }

        .menu-card {
            background: var(--card);
            border-radius: var(--radius);
            margin-bottom: 14px;
            padding: 18px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .menu-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-1px);
        }
        .menu-card.in-cart {
            border-color: rgba(255,107,53,0.2);
            background: linear-gradient(to right, rgba(255,107,53,0.02), transparent);
        }
        .menu-card.in-cart::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary);
            border-radius: var(--radius) 0 0 var(--radius);
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }
        .menu-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            flex: 1;
            line-height: 1.3;
        }
        .menu-price {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            white-space: nowrap;
        }
        .menu-price .currency {
            font-size: 14px;
            font-weight: 600;
            margin-right: 1px;
        }

        .options-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 14px 0;
            padding-top: 10px;
            border-top: 1px dashed var(--border);
        }
        .option-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg);
            padding: 4px;
            border-radius: 30px;
        }
        .option-label {
            font-size: 13px;
            padding: 0 4px 0 10px;
            color: var(--text-light);
            font-weight: 600;
        }
        .option-btn {
            background: white;
            border: 1.5px solid #e0e4e8;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            color: var(--text-light);
            white-space: nowrap;
        }
        .option-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .option-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 2px 6px rgba(255,107,53,0.25);
        }

        .qty-control {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 14px;
            margin-top: 10px;
        }
        .qty-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(255,107,53,0.25);
            -webkit-user-select: none;
            user-select: none;
        }
        .qty-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255,107,53,0.35);
        }
        .qty-btn:active {
            transform: scale(0.92);
        }
        .qty-btn.minus {
            background: var(--danger);
            box-shadow: 0 2px 6px rgba(231,76,60,0.25);
        }
        .qty-btn.minus:hover {
            box-shadow: 0 4px 12px rgba(231,76,60,0.35);
        }
        .qty-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none;
        }
        .qty-number {
            font-size: 20px;
            font-weight: 800;
            min-width: 36px;
            text-align: center;
            color: var(--text);
            transition: var(--transition);
        }
        .qty-number.pulse {
            animation: pulseNumber 0.3s ease;
        }
        @keyframes pulseNumber {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); color: var(--primary); }
            100% { transform: scale(1); }
        }

        .extras-section {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .extras-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .extra-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .extra-btn {
            background: var(--bg);
            border: 1.5px solid transparent;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            color: var(--text);
            font-family: inherit;
        }
        .extra-btn:hover {
            background: white;
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .extra-btn:active {
            transform: translateY(0) scale(0.95);
        }
        .extra-btn .extra-price {
            color: var(--primary);
            font-weight: 700;
        }

        .cart-floating {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 2px solid var(--primary);
            box-shadow: 0 -8px 32px rgba(0,0,0,0.12);
            padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0px)) 20px;
            z-index: 100;
            transition: var(--transition);
        }
        .cart-floating.minimized {
            transform: translateY(calc(100% - 60px));
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .cart-header-title {
            font-weight: 700;
            color: var(--text);
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cart-badge {
            background: var(--primary);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            min-width: 20px;
            text-align: center;
        }
        .cart-toggle {
            font-size: 12px;
            color: var(--text-light);
            transition: var(--transition);
        }
        .cart-floating.minimized .cart-toggle {
            transform: rotate(180deg);
        }
        .cart-items {
            max-height: 220px;
            overflow-y: auto;
            margin-bottom: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }
        .cart-items::-webkit-scrollbar {
            width: 4px;
        }
        .cart-items::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-size: 13px;
            padding: 8px 0;
            border-bottom: 1px dashed var(--border);
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .cart-item-name {
            flex: 2;
            font-weight: 600;
            line-height: 1.4;
        }
        .cart-item-attrs {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 2px;
            font-weight: 500;
        }
        .cart-item-price {
            font-weight: 700;
            color: var(--primary);
            white-space: nowrap;
            text-align: right;
        }
        .cart-item-extras {
            padding-left: 16px;
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-light);
        }
        .cart-item-extra {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 0;
        }
        .delete-extra {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 13px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: var(--transition);
            opacity: 0.7;
        }
        .delete-extra:hover {
            opacity: 1;
            background: rgba(231,76,60,0.08);
        }
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 18px;
            padding: 12px 0;
            border-top: 2px solid var(--border);
            color: var(--text);
        }
        .cart-total-amount {
            color: var(--primary);
            font-size: 22px;
        }
        .btn-generate {
            width: 100%;
            background: var(--secondary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(39,174,96,0.3);
            font-family: inherit;
        }
        .btn-generate:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(39,174,96,0.4);
        }
        .btn-generate:active {
            transform: translateY(0) scale(0.98);
        }
        .btn-generate:disabled {
            background: #bdc3c7;
            pointer-events: none;
            box-shadow: none;
            opacity: 0.7;
        }
        .empty-cart {
            text-align: center;
            color: var(--text-light);
            padding: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            padding: 20px;
        }
        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 28px;
            max-width: 90%;
            width: 380px;
            text-align: center;
            transform: scale(0.9) translateY(20px);
            transition: var(--transition);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-overlay.show .modal-content {
            transform: scale(1) translateY(0);
        }
        .modal-content h3 {
            margin-bottom: 20px;
            color: var(--text);
            font-size: 20px;
            font-weight: 800;
        }
        .qr-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            padding: 16px;
            background: white;
            border-radius: 16px;
            border: 2px dashed var(--border);
        }
        .order-summary {
            background: var(--bg);
            border-radius: 14px;
            padding: 16px;
            margin: 16px 0;
            font-size: 13px;
            text-align: left;
            line-height: 1.8;
        }
        .order-summary strong {
            color: var(--primary);
        }
        .close-modal {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            width: 100%;
            margin-top: 8px;
        }
        .close-modal:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .price-input {
            width: 100%;
            padding: 16px;
            font-size: 24px;
            text-align: center;
            border: 2px solid var(--primary);
            border-radius: 14px;
            margin: 20px 0;
            font-weight: 700;
            color: var(--text);
            font-family: inherit;
            transition: var(--transition);
        }
        .price-input:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(255,107,53,0.15);
        }
        .price-modal-buttons {
            display: flex;
            gap: 12px;
        }
        .price-modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            font-family: inherit;
        }
        .price-confirm {
            background: var(--secondary);
            color: white;
            box-shadow: 0 2px 8px rgba(39,174,96,0.25);
        }
        .price-confirm:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(39,174,96,0.35);
        }
        .price-cancel {
            background: var(--bg);
            color: var(--text);
            border: 1.5px solid #e0e4e8 !important;
        }
        .price-cancel:hover {
            background: #f0f2f5;
        }

        .alert-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .alert-ok {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            width: 100%;
        }
        .alert-ok:hover {
            background: var(--primary-dark);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f0f0f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-text {
            color: var(--text-light);
            font-size: 15px;
            font-weight: 600;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-error {
            color: var(--danger);
            text-align: center;
            padding: 24px;
            font-weight: 600;
        }
        .retry-btn {
            margin-top: 16px;
            padding: 12px 28px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: var(--transition);
        }
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,107,53,0.3);
        }

        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--text);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            z-index: 300;
            opacity: 0;
            transition: var(--transition);
            pointer-events: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        .no-results-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        @media (min-width: 768px) {
            body {
                max-width: 600px;
                margin: 0 auto;
                padding-bottom: 160px;
            }
            .cart-floating {
                max-width: 600px;
                left: 50%;
                transform: translateX(-50%);
            }
            .cart-floating.minimized {
                transform: translateX(-50%) translateY(calc(100% - 60px));
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Cargando menú...</div>
</div>

<div id="mainContent" style="display: none;">
    <div class="lang-bar">
        <button class="lang-btn" data-lang="en" aria-label="English">🇺🇸 EN</button>
        <button class="lang-btn active" data-lang="es" aria-label="Español">🇪🇸 ES</button>
        <button class="lang-btn" data-lang="zh" aria-label="中文">🇨🇳 中文</button>
    </div>

    <div class="header">
        <h1 id="shop-name">Soda Sonrisas</h1>
        <p id="shop-desc">📱 Escanea el código para pagar en caja</p>
    </div>

    <div class="input-section">
        <label class="input-label" id="phone-label">📞 Teléfono de contacto *</label>
        <input type="tel" id="phoneInput" class="input-field" placeholder="88888888" maxlength="8" inputmode="numeric" pattern="[0-9]*">
        <div id="phoneError" class="input-error">El teléfono debe tener 8 dígitos</div>
    </div>

    <div class="input-section">
        <label class="input-label" id="notes-label">📝 Observaciones / Notas</label>
        <textarea id="notesInput" class="input-field" rows="2" placeholder="Ej: Sin cebolla, picante, etc..."></textarea>
    </div>

    <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="Buscar producto...">
        <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>

    <div id="menu-container"></div>
</div>

<div class="cart-floating" id="cartFloating">
    <div class="cart-header" onclick="toggleCart()">
        <span class="cart-header-title">
            🛒 <span id="cart-title">Mi pedido</span>
            <span class="cart-badge" id="cart-badge">0</span>
        </span>
        <span class="cart-toggle" id="cart-toggle">▼</span>
    </div>
    <div id="cart-items-list" class="cart-items">
        <div class="empty-cart">No hay productos seleccionados</div>
    </div>
    <div class="cart-total">
        <span id="total-label">Total</span>
        <span class="cart-total-amount" id="cart-total-amount">₡0</span>
    </div>
    <button id="generateQRBtn" class="btn-generate" onclick="generateOrderQR()" disabled>
        📱 Generar QR para pagar
    </button>
</div>

<div id="qrModal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modal-title">📱 Muestra este código</h3>
        <div id="qr-code" class="qr-container"></div>
        <div class="order-summary" id="qr-order-summary"></div>
        <button class="close-modal" onclick="closeQRModal()" id="close-btn">Cerrar</button>
    </div>
</div>

<div id="priceModal" class="modal-overlay">
    <div class="modal-content" style="width: 320px;">
        <h4 id="priceModalTitle" style="font-size: 18px; font-weight: 700; margin-bottom: 8px;">Ingrese precio</h4>
        <p style="font-size: 13px; color: var(--text-light); margin-bottom: 4px;">Mínimo ₡1,000</p>
        <input type="number" id="priceInput" class="price-input" min="1000" step="100" value="1000" inputmode="numeric">
        <div class="price-modal-buttons">
            <button class="price-confirm" onclick="confirmPrice()">Confirmar</button>
            <button class="price-cancel" onclick="cancelPrice()">Cancelar</button>
        </div>
    </div>
</div>

<div id="alertModal" class="modal-overlay">
    <div class="modal-content" style="width: 320px;">
        <div class="alert-icon">📢</div>
        <h3 id="alertTitle" style="font-size: 18px; font-weight: 800; margin-bottom: 8px;">Atención</h3>
        <p id="alertMessage">Si desea agregar ingredientes especiales, menciónelos en NOTAS.</p>
        <button class="alert-ok" onclick="closeAlert()">Entendido</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ============================================================
    // CONFIGURACIÓN Y ESTADO
    // ============================================================
    const CONFIG = {
        SUPABASE_URL: 'https://lqgwqqbtzjxplcvdxuqs.supabase.co',
        BUCKET_NAME: 'menu',
        FILE_PATH: 'menu.json',
        SIMPLE_CODES: new Set([1, 2, 3, 4, 6, 7, 46, 47]),
        MIN_EXTRA_PRICE: 1000,
        PHONE_LENGTH: 8
    };

    const State = {
        products: [],
        extras: [],
        cart: [],
        lang: 'es',
        filteredProducts: [],
        pendingExtra: null,
        cartMinimized: false
    };

    // ============================================================
    // TRADUCCIONES
    // ============================================================
    const I18N = {
        en: { 
            shopName:"Soda Sonrisas", 
            shopDesc:"📱 Scan QR to pay at counter", 
            cartTitle:"My Order", 
            totalLabel:"Total", 
            generateBtn:"📱 Generate QR to Pay", 
            modalTitle:"📱 Show this QR to cashier", 
            closeBtn:"Close", 
            emptyCart:"No items selected", 
            itemsCount:n=>`${n} item${n!==1?'s':''}`, 
            conOlor:"Con olor", 
            sinOlor:"Sin olor", 
            deLaCasa:"De la casa (+₡400)", 
            normal:"Normal", 
            priceTitle:"Enter price (min ₡1,000)", 
            confirm:"Confirm", 
            cancel:"Cancel", 
            addExtraDisabled:"Please add a main dish first", 
            phoneLabel:"📞 Contact phone *", 
            phonePlaceholder:"8 digits", 
            notesLabel:"📝 Notes / Special requests", 
            alertTitle:"📢 Important Notice", 
            alertMessage:"If you wish to add special ingredients, please mention them in NOTES.", 
            phoneError:"Phone number must be 8 digits", 
            noResults:"No products found", 
            searchPlaceholder:"Search product...", 
            addedToCart:"Added to cart", 
            removedFromCart:"Removed from cart" 
        },
        es: { 
            shopName:"Soda Sonrisas", 
            shopDesc:"📱 Escanea el QR para pagar en caja", 
            cartTitle:"Mi pedido", 
            totalLabel:"Total", 
            generateBtn:"📱 Generar QR para pagar", 
            modalTitle:"📱 Muestra este QR en caja", 
            closeBtn:"Cerrar", 
            emptyCart:"No hay productos seleccionados", 
            itemsCount:n=>`${n} producto${n!==1?'s':''}`, 
            conOlor:"Con olor", 
            sinOlor:"Sin olor", 
            deLaCasa:"De la casa (+₡400)", 
            normal:"Normal", 
            priceTitle:"Ingrese precio (mín ₡1,000)", 
            confirm:"Confirmar", 
            cancel:"Cancelar", 
            addExtraDisabled:"Agregue un plato principal primero", 
            phoneLabel:"📞 Teléfono de contacto *", 
            phonePlaceholder:"8 dígitos", 
            notesLabel:"📝 Observaciones / Notas", 
            alertTitle:"📢 Aviso importante", 
            alertMessage:"Si desea agregar ingredientes especiales, menciónelos en NOTAS.", 
            phoneError:"El teléfono debe tener 8 dígitos", 
            noResults:"No se encontraron productos", 
            searchPlaceholder:"Buscar producto...", 
            addedToCart:"Agregado al carrito", 
            removedFromCart:"Eliminado del carrito" 
        },
        zh: { 
            shopName:"Soda Sonrisas", 
            shopDesc:"📱 扫码到前台付款", 
            cartTitle:"已选菜品", 
            totalLabel:"总计", 
            generateBtn:"📱 生成付款二维码", 
            modalTitle:"📱 请出示此码到前台", 
            closeBtn:"关闭", 
            emptyCart:"暂未选择菜品", 
            itemsCount:n=>`${n} 个菜品`, 
            conOlor:"正常口味", 
            sinOlor:"淡口味", 
            deLaCasa:"招牌升级 (+₡400)", 
            normal:"普通", 
            priceTitle:"输入价格 (最低 ₡1,000)", 
            confirm:"确认", 
            cancel:"取消", 
            addExtraDisabled:"请先添加主菜", 
            phoneLabel:"📞 联系电话 *", 
            phonePlaceholder:"8位数字", 
            notesLabel:"📝 备注 / 特殊要求", 
            alertTitle:"📢 重要提示", 
            alertMessage:"如需添加特殊配料，请在备注中说明。", 
            phoneError:"电话号码必须为8位数字", 
            noResults:"未找到产品", 
            searchPlaceholder:"搜索产品...", 
            addedToCart:"已加入购物车", 
            removedFromCart:"已从购物车移除" 
        }
    };

    function t(key, ...args) { 
        const val = I18N[State.lang][key]; 
        return typeof val === 'function' ? val(...args) : val; 
    }
    const $ = id => document.getElementById(id);
    const escapeHtml = str => str?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) || '';
    const isSimple = code => CONFIG.SIMPLE_CODES.has(code);
    const getName = (item, type = 'product') => State.lang === 'en' ? item.name_en : State.lang === 'zh' ? item.name_zh : item.name_es;
    const getFinalPrice = (base, customType) => customType === 'type1' ? base + 400 : base;
    const getAttrCode = (importType, customType) => (importType === 'local' ? 1 : 0) + (customType === 'type1' ? 2 : 0);
    function showToast(msg, duration=2000) { 
        const toast = $('toast'); 
        toast.textContent = msg; 
        toast.classList.add('show'); 
        setTimeout(()=>toast.classList.remove('show'), duration); 
    }

    // ============================================================
    // RENDERIZADO
    // ============================================================
    function renderMenu() {
        const container = $('menu-container');
        if (State.filteredProducts.length === 0) { 
            container.innerHTML = `<div class="no-results"><div class="no-results-icon">🔍</div><div>${t('noResults')}</div></div>`; 
            return; 
        }
        const categoryTitle = State.lang === 'en' ? 'Main Dishes' : State.lang === 'zh' ? '主菜' : 'Platos Principales';
        let html = `<div class="category">${categoryTitle}<span class="category-count">${State.filteredProducts.length}</span></div>`;
        for (const product of State.filteredProducts) {
            const id = product.code, simple = isSimple(id);
            const cartItem = State.cart.find(i => i.productId === id);
            const qty = cartItem?.qty || 0, inCart = qty > 0;
            // ✅ 关键修改：简单产品强制使用 'local' (con olor)
            const importType = simple ? 'local' : (cartItem?.importType || 'local');
            const customType = simple ? '' : (cartItem?.customType || '');
            const displayPrice = getFinalPrice(product.basePrice, simple ? '' : customType);
            html += `<div class="menu-card ${inCart ? 'in-cart' : ''}" data-product-id="${id}"><div class="menu-header"><span class="menu-name">${escapeHtml(getName(product))}</span><span class="menu-price"><span class="currency">₡</span>${displayPrice}</span></div>`;
            if (!simple) {
                html += `<div class="options-row"><div class="option-group"><span class="option-label">🧅</span><button class="option-btn ${importType === 'local' ? 'active' : ''}" onclick="updateOption(${id}, 'import', 'local')">${t('conOlor')}</button><button class="option-btn ${importType === 'imported' ? 'active' : ''}" onclick="updateOption(${id}, 'import', 'imported')">${t('sinOlor')}</button></div><div class="option-group"><span class="option-label">⭐</span><button class="option-btn ${customType === '' ? 'active' : ''}" onclick="updateOption(${id}, 'custom', '')">${t('normal')}</button><button class="option-btn ${customType === 'type1' ? 'active' : ''}" onclick="updateOption(${id}, 'custom', 'type1')">${t('deLaCasa')}</button></div></div>`;
            }
            html += `<div class="qty-control"><button class="qty-btn minus" onclick="updateQty(${id}, -1)" ${qty===0?'disabled':''}>−</button><span class="qty-number ${qty>0?'pulse':''}" id="qty-${id}">${qty}</span><button class="qty-btn" onclick="updateQty(${id}, 1)">+</button></div>`;
            if (!simple && inCart) html += `<div class="extras-section"><div class="extras-title">➕ ${State.lang==='en'?'Add-ons':State.lang==='zh'?'加料':'Extras'}</div><div class="extra-buttons">${State.extras.map(extra => `<button class="extra-btn" onclick="addExtra(${id}, '${extra.id}', '${escapeHtml(getName(extra))}')"><span>${escapeHtml(getName(extra))}</span><span class="extra-price">₡${extra.defaultPrice}</span></button>`).join('')}</div></div>`;
            html += '</div>';
        }
        container.innerHTML = html;
        setTimeout(()=>document.querySelectorAll('.qty-number.pulse').forEach(el=>el.classList.remove('pulse')),300);
    }

    function renderCart() {
        const container = $('cart-items-list'); 
        let total = 0, itemsHtml = '', totalQty = 0;
        for (const item of State.cart) {
            if (item.qty === 0 && item.extras.length === 0) continue;
            const simple = isSimple(item.productId);
            const finalPrice = getFinalPrice(item.basePrice, simple ? '' : item.customType);
            const itemTotal = finalPrice * item.qty; 
            total += itemTotal; 
            totalQty += item.qty;
            let attrs = [];
            if (!simple) { 
                if (item.importType === 'local') attrs.push(t('conOlor')); 
                if (item.customType === 'type1') attrs.push(t('deLaCasa')); 
            } else {
                // 简单产品显示 "Con olor"
                attrs.push(t('conOlor'));
            }
            itemsHtml += `<div class="cart-item"><div><div class="cart-item-name">${escapeHtml(item.name)} × ${item.qty}</div>${attrs.length ? `<div class="cart-item-attrs">${attrs.join(' • ')}</div>` : ''}${item.extras.length ? `<div class="cart-item-extras">${item.extras.map((e,idx)=>`<div class="cart-item-extra"><span>↳ ${escapeHtml(e.name)}</span><span><span style="color: var(--primary); font-weight: 600;">₡${e.price}</span><button class="delete-extra" onclick="removeExtra(${State.cart.indexOf(item)}, ${idx})">✕</button></span></div>`).join('')}</div>` : ''}</div><div class="cart-item-price">₡${itemTotal}</div></div>`;
            for (const extra of item.extras) total += extra.price;
        }
        if (!itemsHtml) itemsHtml = `<div class="empty-cart">${t('emptyCart')}</div>`;
        container.innerHTML = itemsHtml;
        $('cart-total-amount').textContent = `₡${total.toLocaleString()}`;
        $('cart-badge').textContent = totalQty;
        $('generateQRBtn').disabled = totalQty === 0;
        $('cart-title').textContent = t('cartTitle');
    }

    // ============================================================
    // ACCIONES
    // ============================================================
    window.updateQty = function(productId, delta) {
        const product = State.products.find(p => p.code === productId); 
        if (!product) return;
        const simple = isSimple(productId);
        let item = State.cart.find(i => i.productId === productId);
        if (delta > 0) {
            if (!item) {
                // ✅ 创建新item时默认使用 'local' (con olor)
                item = { 
                    productId: product.code, 
                    name: getName(product), 
                    basePrice: product.basePrice, 
                    qty: 0, 
                    importType: 'local',
                    customType: '', 
                    extras: [] 
                };
                State.cart.push(item);
            }
            // ✅ 如果是简单产品，强制设为 'local'
            if (simple) {
                item.importType = 'local';
            }
            item.qty++;
            showToast(t('addedToCart'));
        } else if (item) { 
            item.qty--; 
            if (item.qty <= 0) { 
                item.qty = 0; 
                item.extras = []; 
                State.cart = State.cart.filter(i => i.productId !== productId); 
            } 
            showToast(t('removedFromCart')); 
        }
        renderMenu(); 
        renderCart();
    };

    window.updateOption = function(productId, type, value) {
        if (isSimple(productId)) return;
        let item = State.cart.find(i => i.productId === productId);
        if (!item) { 
            const product = State.products.find(p => p.code === productId); 
            if (!product) return; 
            item = { 
                productId: product.code, 
                name: getName(product), 
                basePrice: product.basePrice, 
                qty: 0, 
                importType: 'local', 
                customType: '', 
                extras: [] 
            }; 
            State.cart.push(item); 
        }
        if (type === 'import') item.importType = value;
        if (type === 'custom') item.customType = value;
        renderMenu(); 
        renderCart();
    };

    window.addExtra = function(productId, extraId, extraName) {
        const item = State.cart.find(i => i.productId === productId);
        if (!item || item.qty === 0) { 
            showToast(t('addExtraDisabled')); 
            return; 
        }
        const extraDef = State.extras.find(e => e.id === extraId);
        const defaultPrice = extraDef?.defaultPrice || 1000;
        State.pendingExtra = { productId, extraId, extraName, defaultPrice };
        $('priceModalTitle').textContent = t('priceTitle');
        $('priceInput').value = defaultPrice;
        $('priceModal').classList.add('show');
        $('priceInput').focus(); 
        $('priceInput').select();
    };

    window.confirmPrice = function() {
        let price = parseInt($('priceInput').value);
        if (isNaN(price) || price < CONFIG.MIN_EXTRA_PRICE) price = CONFIG.MIN_EXTRA_PRICE;
        if (State.pendingExtra) { 
            const { productId, extraId, extraName } = State.pendingExtra; 
            const item = State.cart.find(i => i.productId === productId); 
            if (item) item.extras.push({ id: extraId, name: extraName, price }); 
        }
        $('priceModal').classList.remove('show'); 
        State.pendingExtra = null; 
        renderCart();
    };

    window.cancelPrice = function() { 
        $('priceModal').classList.remove('show'); 
        State.pendingExtra = null; 
    };

    window.removeExtra = function(itemIdx, extraIdx) { 
        if (State.cart[itemIdx]) { 
            State.cart[itemIdx].extras.splice(extraIdx, 1); 
            if (State.cart[itemIdx].qty === 0 && State.cart[itemIdx].extras.length === 0) 
                State.cart.splice(itemIdx, 1); 
            renderMenu(); 
            renderCart(); 
        } 
    };

    window.toggleCart = function() { 
        State.cartMinimized = !State.cartMinimized; 
        $('cartFloating').classList.toggle('minimized', State.cartMinimized); 
    };

    function validatePhone() { 
        const phone = $('phoneInput').value.trim(); 
        const error = $('phoneError'); 
        if (phone && !/^\d{8}$/.test(phone)) { 
            error.classList.add('show'); 
            return false; 
        } 
        error.classList.remove('show'); 
        return true; 
    }

    function generateQRContent() {
    const validItems = State.cart.filter(i => i.qty > 0);
    if (!validItems.length) return '';
    return validItems.map(item => { 
        const simple = isSimple(item.productId); 
        let attrCode;
        if (simple) {
            // ✅ 简单产品：attrCode = 1 表示 "con olor"
            attrCode = 1;
        } else {
            // 非简单产品：根据用户选择计算
            attrCode = getAttrCode(item.importType, item.customType);
        }
        let str = `${item.productId}|${item.qty}|${attrCode}`; 
        if (item.extras?.length) str += '|' + item.extras.map(e => `${e.id}|${e.price}`).join('!'); 
        return str; 
    }).join(';');
}

    window.generateOrderQR = function() {
        if (!validatePhone()) { 
            $('phoneInput').focus(); 
            return; 
        }
        const validItems = State.cart.filter(i => i.qty > 0);
        if (!validItems.length) { 
            showToast(t('emptyCart')); 
            return; 
        }
        let total = 0;
        for (const item of validItems) { 
            const simple = isSimple(item.productId); 
            total += getFinalPrice(item.basePrice, simple ? '' : item.customType) * item.qty; 
            total += item.extras?.reduce((s, e) => s + e.price, 0) || 0; 
        }
        const phone = $('phoneInput').value.trim(), notes = $('notesInput').value.trim();
        let qrContent = generateQRContent(); 
        if (phone) qrContent += `|${phone}`; 
        if (notes) qrContent += `|${notes.replace(/\|/g, ' ')}`;
        const qrDiv = $('qr-code'); 
        qrDiv.innerHTML = '';
        try { 
            new QRCode(qrDiv, { text: qrContent, width: 220, height: 220, correctLevel: QRCode.CorrectLevel.M }); 
        } catch(e) { 
            qrDiv.innerHTML = '<div style="color: var(--danger); font-weight: 600;">Error generando QR</div>'; 
        }
        const itemCount = validItems.reduce((s, i) => s + i.qty, 0);
        $('qr-order-summary').innerHTML = `<div><strong>${itemCount} producto(s)</strong></div><div>Total: <strong>₡${total.toLocaleString()}</strong></div>${phone ? `<div>📞 Tel: ${escapeHtml(phone)}</div>` : ''}${notes ? `<div>📝 Notas: ${escapeHtml(notes.substring(0, 50))}${notes.length > 50 ? '...' : ''}</div>` : ''}`;
        $('modal-title').textContent = t('modalTitle'); 
        $('close-btn').textContent = t('closeBtn'); 
        $('qrModal').classList.add('show');
    };

    window.closeQRModal = function() { 
        $('qrModal').classList.remove('show'); 
    };

    window.closeAlert = function() { 
        $('alertModal').classList.remove('show'); 
    };

    function setLanguage(lang) { 
        State.lang = lang; 
        $('shop-name').textContent = I18N[lang].shopName; 
        $('shop-desc').textContent = I18N[lang].shopDesc; 
        $('cart-title').textContent = I18N[lang].cartTitle; 
        $('total-label').textContent = I18N[lang].totalLabel; 
        $('generateQRBtn').innerHTML = I18N[lang].generateBtn; 
        $('phone-label').innerHTML = I18N[lang].phoneLabel; 
        $('phoneInput').placeholder = I18N[lang].phonePlaceholder; 
        $('notes-label').innerHTML = I18N[lang].notesLabel; 
        $('searchInput').placeholder = t('searchPlaceholder'); 
        $('alertTitle').textContent = I18N[lang].alertTitle; 
        $('alertMessage').textContent = I18N[lang].alertMessage; 
        for (const item of State.cart) { 
            const product = State.products.find(p => p.code === item.productId); 
            if (product) item.name = getName(product); 
            for (const extra of item.extras) { 
                const extraDef = State.extras.find(e => e.id === extra.id); 
                if (extraDef) extra.name = getName(extraDef); 
            } 
        } 
        renderMenu(); 
        renderCart(); 
    }

    function handleSearch(e) { 
        const term = e.target.value.toLowerCase().trim(); 
        $('searchClear').classList.toggle('show', term.length > 0); 
        State.filteredProducts = term ? 
            State.products.filter(p => p.active !== false && (p.name_es?.toLowerCase().includes(term) || p.name_en?.toLowerCase().includes(term) || p.name_zh?.toLowerCase().includes(term))) : 
            State.products.filter(p => p.active !== false); 
        renderMenu(); 
    }

    window.clearSearch = function() { 
        $('searchInput').value = ''; 
        $('searchClear').classList.remove('show'); 
        State.filteredProducts = State.products.filter(p => p.active !== false); 
        renderMenu(); 
        $('searchInput').focus(); 
    };

    function getMenuUrl() { 
        return `${CONFIG.SUPABASE_URL}/storage/v1/object/public/${CONFIG.BUCKET_NAME}/${CONFIG.FILE_PATH}?t=${Date.now()}`; 
    }

    async function loadMenuData() {
        try {
            const response = await fetch(getMenuUrl(), { cache: 'no-cache', headers: { 'Cache-Control': 'no-cache' } });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            State.products = data.products || []; 
            State.extras = data.extras || [];
            State.filteredProducts = State.products.filter(p => p.active !== false);
            $('loadingOverlay').classList.add('hidden'); 
            $('mainContent').style.display = 'block';
            renderMenu(); 
            renderCart();
            if (!sessionStorage.getItem('alertShown')) { 
                $('alertModal').classList.add('show'); 
                sessionStorage.setItem('alertShown', 'true'); 
            }
        } catch (error) { 
            $('loadingOverlay').innerHTML = `<div class="loading-error">❌ Error: ${escapeHtml(error.message)}<br><br><button class="retry-btn" onclick="location.reload()">Reintentar</button></div>`; 
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => { 
            const lang = btn.dataset.lang; 
            setLanguage(lang); 
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); 
        }));
        $('searchInput').addEventListener('input', handleSearch); 
        $('phoneInput').addEventListener('input', validatePhone);
        document.addEventListener('keydown', (e) => { 
            if (e.key === 'Escape') { 
                $('qrModal').classList.remove('show'); 
                $('priceModal').classList.remove('show'); 
                $('alertModal').classList.remove('show'); 
            } 
            if (e.key === 'Enter' && $('priceModal').classList.contains('show')) confirmPrice(); 
        });
        document.querySelectorAll('.modal-overlay').forEach(modal => modal.addEventListener('click', (e) => { 
            if (e.target === modal && modal.id !== 'alertModal') modal.classList.remove('show'); 
        }));
        loadMenuData();
    });
</script>
</body>
</html>
